<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Arpeggiatore Vettoriale</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 800px; background: transparent; font-family: Helvetica, Arial, sans-serif; overflow: hidden; }
    
    /* Perfettamente allineato all'interfaccia principale (40px) */
    #options-container { 
      width: 800px; 
      height: 64px; 
      display: flex; 
      align-items: center; 
      gap: 16px; 
      padding-left: 40px;
      padding-right: 40px;
      flex-wrap: wrap; 
    }
    
    #canvas-holder { width: 800px; height: 480px; background: #fff; border: 1px solid #000; position: relative; }
    canvas { display: block; }
    
    /* Sliders allineati a 40px */
    #sliders-container {
      width: 800px; 
      padding-top: 16px; 
      padding-left: 40px;
      padding-right: 40px;
      display: flex; 
      flex-direction: column; 
      gap: 12px;
    }
    
    .control-row { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; color: #000; }
    .control-label { width: 60px; }
    .control-value { width: 60px; text-align: left; }
    input[type="range"] { -webkit-appearance: none; flex-grow: 1; height: 2px; background: #000; outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #000; cursor: pointer; }
    
    /* Stili premium per Input Sequenza ed Elementi di Controllo */
    .p5-input-seq {
      border: 1px solid #000;
      padding: 8px 12px;
      font-family: monospace;
      font-size: 0.9rem;
      width: 220px;
      outline: none;
    }
    .p5-select-preset {
      border: 1px solid #000;
      padding: 8px 12px;
      font-family: Helvetica, Arial, sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      background: #fff;
      outline: none;
      cursor: pointer;
    }
    .label-bold {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    
    button {
      background: #000; color: #fff; border: 1px solid #000; padding: 8px 16px; font-family: Helvetica, Arial, sans-serif;
      font-size: 0.8rem; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.2s;
    }
    button:hover { background: #fff; color: #000; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
</head>
<body>
  <div id="options-container"></div>
  <div id="canvas-holder"></div>
  <div id="sliders-container"></div>
  <script src="sketch.js"></script>
</body>
</html>
