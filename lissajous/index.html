<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Figure di Lissajous</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 800px; background: transparent; font-family: Helvetica, Arial, sans-serif; overflow: hidden; }
    
    /* Perfettamente allineato all'interfaccia principale (40px) */
    #options-container {
      width: 800px; 
      min-height: 64px; 
      display: flex; 
      align-items: center; 
      flex-wrap: wrap;
      gap: 12px; 
      padding: 12px 40px;
    }
    
    #canvas-holder { width: 800px; height: 480px; background: #fff; border: 1px solid #000; position: relative; }
    canvas { display: block; }
    
    /* Griglia a 2 Colonne perfettamente allineata a 40px di rientro */
    #sliders-container { 
      width: 800px; 
      padding-top: 16px; 
      padding-left: 40px;
      padding-right: 40px;
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 16px; 
    }
    
    .control-row { 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      font-size: 0.8rem; 
      font-weight: 700; 
      color: #000; 
      background: #fdfdfd;
      border: 1px solid #eee;
      padding: 8px 12px;
    }
    .control-label { width: 40px; }
    .control-value { width: 45px; text-align: right; }
    input[type="range"] { -webkit-appearance: none; flex-grow: 1; height: 2px; background: #000; outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #000; cursor: pointer; }
    
    button {
      background: #fff; border: 1px solid #000; padding: 8px 12px; font-family: Helvetica, Arial, sans-serif;
      font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: 0.2s;
    }
    button:hover { background: #000; color: #fff; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
</head>
<body>
  <div id="options-container"></div>
  <div id="canvas-holder"></div>
  <div id="sliders-container"></div>
  <script src="sketch.js"></script>
</body>
</html>
