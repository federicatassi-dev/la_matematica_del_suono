<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Battimenti e Interferenza</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 800px;
      background: transparent;
      font-family: Helvetica, Arial, sans-serif;
      overflow: hidden;
    }
    
    /* Perfettamente allineato all'interfaccia principale (40px) */
    #options-container {
      width: 800px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 20px;
      padding-left: 40px;
      padding-right: 40px;
    }
    
    #canvas-holder {
      width: 800px;
      height: 480px;
      background: #fff;
      border: 1px solid #000;
      position: relative;
    }
    canvas {
      display: block;
    }
    
    /* Sliders allineati a 40px con larghezza bilanciata per gli elementi interni */
    #sliders-container {
      width: 800px;
      padding-top: 16px;
      padding-left: 40px;
      padding-right: 40px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .control-row {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #000;
    }
    .control-label {
      width: 50px;
    }
    .control-value {
      width: 60px;
      text-align: right;
    }
    input[type="range"] {
      -webkit-appearance: none;
      flex-grow: 1; /* Riempie lo spazio in modo responsivo */
      height: 2px;
      background: #000;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #000;
      cursor: pointer;
    }
    button {
      background: #fff;
      border: 1px solid #000;
      padding: 8px 16px;
      font-family: Helvetica, Arial, sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    button:hover {
      background: #000;
      color: #fff;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
</head>
<body>
  <div id="options-container"></div>
  <div id="canvas-holder"></div>
  <div id="sliders-container"></div>
  <script src="sketch.js"></script>
</body>
</html>
